<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSG - TxDOT Load Board</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#374151;border-radius:4px}
.hdr{background:linear-gradient(135deg,#0f1629,#1a1025);border-bottom:1px solid #1e293b;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#c2410c,#b91c1c);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
.tabs{display:flex;gap:3px;background:#111827;border-radius:8px;padding:3px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#94a3b8;transition:all .15s}
.tab.active{background:#c2410c;color:#fff}
.filter-bar{display:flex;gap:8px;padding:10px 20px;border-bottom:1px solid #1e293b;align-items:center;flex-wrap:wrap;background:#0f1629}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;padding:12px 20px}
.stat{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:12px 14px}
.stat-val{font-size:24px;font-weight:700;color:#f8fafc}
.stat-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.main{padding:0 20px 20px}
select,input[type=text],input[type=number],input[type=date]{background:#0d1117;border:1px solid #1e293b;border-radius:4px;padding:4px 8px;font-size:12px;color:#e2e8f0;outline:none;font-family:inherit}
.btn{padding:6px 14px;border-radius:4px;border:1px solid #1e293b;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;font-weight:600}
.btn-accent{background:#c2410c;color:#fff;border:none}
.btn-green{border-color:#16a34a80;color:#22c55e}
.row{display:grid;gap:3px;align-items:center;padding:6px 8px;background:#111827;border:1px solid #1e293b;border-radius:6px;margin-bottom:3px;font-size:11px}
.row-hdr{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.04em;font-weight:600;background:#0f1629;position:sticky;top:0;z-index:5}
.cols{grid-template-columns:32px 130px 160px 110px 1fr 42px 38px 40px 68px 96px 48px 100px 92px 68px}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:20px;border-radius:4px;font-size:11px;font-weight:700;padding:0 5px}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;margin-right:3px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#111827;border:1px solid #374151;border-radius:12px;padding:24px;max-width:620px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e293b20;font-size:13px}
.detail-label{color:#94a3b8;font-weight:600;min-width:140px;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.detail-value{color:#e2e8f0;text-align:right;flex:1}
.cal-cell{border:1px solid #1e293b;min-height:140px;padding:5px;vertical-align:top}
.cal-cell:hover{background:#1a223688}
.cal-today{border:2px solid #c2410c!important}
.drag-over{background:rgba(194,65,12,.1)!important;border-color:#c2410c!important}
.cal-tag{font-size:10px;padding:4px 6px;border-radius:4px;margin-bottom:3px;cursor:pointer;line-height:1.3;transition:background .15s}
.cal-tag:hover{filter:brightness(1.2)}
.cal-tag.delivered{opacity:.65;border-left-color:#4b556380!important}
table.cal{width:100%;border-collapse:collapse;table-layout:fixed}
.hidden{display:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

/* =========================================================
   ONE-FILE DATA: Load CSV from GitHub Pages for everyone
   ========================================================= */

// 1) Put your daily CSV at: /data/TXDOT_latest.csv (in this repo)
// 2) Overwrite it in GitHub each day
// 3) Everyone refreshes and sees the update
const CSV_URL = 'TXDOT_latest.csv';

// Dynamic "today" for SLA color/overdue logic
const NOW = new Date();
const TODAY = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate());
const toYMD = d => d.toISOString().slice(0,10);

// CSV parsing helpers (robust to quoted commas and escaped quotes)
function parseCsvLine(line){
  const out=[]; let cur='', inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(inQuotes && line[i+1]==='"'){ cur+='"'; i++; }
      else inQuotes=!inQuotes;
    } else if(ch===',' && !inQuotes){
      out.push(cur); cur='';
    } else cur+=ch;
  }
  out.push(cur);
  return out.map(s=>s.trim());
}
function parseCsvToRows(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
  if(!lines.length) return [];
  const hdr=parseCsvLine(lines[0].replace(/^\uFEFF/,'')).map(h=>h.replace(/"/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const l=lines[i]; if(!l) continue;
    const vals=parseCsvLine(l);
    const obj={}; hdr.forEach((h,j)=>obj[h]=(vals[j]||'').replace(/"/g,''));
    const acct=obj['Account Name_2']||''; if(!acct) continue;

    let rBy=''; const rb=obj['Required By']||'';
    if(rb){ const m=rb.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) rBy=`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; }
    let sr=parseInt(obj['Shipments Remaining']||'0')||0;
    if(!sr){
      Object.keys(obj).forEach(k=>{
        const v=(obj[k]||'').trim();
        if(!k.trim() && /^\d+$/.test(v) && parseInt(v)>0) sr=parseInt(v);
      });
    }
    let term=obj['Terminal Key']||'';
    if(!term){
      Object.keys(obj).forEach(k=>{
        if(!k.trim() && (obj[k]||'').includes('TX')) term=(obj[k]||'').trim();
      });
    }
    rows.push({
      account: acct.trim(),
      location: (obj['Location Name_3']||'').trim(),
      orderNbr: (obj['Related Order Nbr']||'').trim(),
      product: (obj['Product']||'').trim(),
      orderedQty: parseInt(obj['Ordered Qty.']||'0')||0,
      shipments: parseInt(obj['Shipments']||'0')||0,
      shipmentsRemaining: sr,
      requiredBy: rBy,
      terminal: term.trim()
    });
  }
  return rows;
}
async function fetchText(url){
  const res=await fetch(url,{cache:'no-store'});
  if(!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.text();
}

/* =========================================================
   Your existing embedded DATA stays as fallback.
   (Used on first paint or if CSV is missing)
   ========================================================= */
const DATA=[{"account":"TxDOT Odessa District","location":"Crane","orderNbr":"WO0002099","product":"Road Salt ASTM Type I Bulk","orderedQty":8,"shipments":0,"shipmentsRemaining":8,"requiredBy":"2026-01-28","terminal":"KRESS, TX"},{"account":"TxDOT El Paso District","location":"West El Paso MO - El Paso, TX","orderNbr":"WO0003871","product":"Brine Salt Type II Bulk","orderedQty":4,"shipments":0,"shipmentsRemaining":4,"requiredBy":"2026-03-19","terminal":"KRESS, TX"},/* ... (unchanged embedded dataset, truncated here for brevity) ... */{"account":"TxDOT Fort Worth District","location":"Glen Rose MO - 503 NE Big Bend Trail, Glen Rose","orderNbr":"WO0003342","product":"Brine Solution","orderedQty":6,"shipments":5,"shipmentsRemaining":1,"requiredBy":"2026-02-13","terminal":"CLEBURNE, TX"}];

const TRAILERS=['','Belt','Dry Bulk Pneumatic','End Dump','Flatbed','Hopper Bottom','Tanker','Van/Enclosed','Walking Floor'];
const SORTS=[{k:'requiredBy_asc',l:'Required By (oldest)'},{k:'requiredBy_desc',l:'Required By (newest)'},{k:'account_asc',l:'Account A-Z'},{k:'account_desc',l:'Account Z-A'},{k:'shipmentsRemaining_desc',l:'Most Remaining'},{k:'shipmentsRemaining_asc',l:'Least Remaining'},{k:'product_asc',l:'Product A-Z'}];

// State
let state={
  data:DATA.map((r,i)=>({...r,_id:i})),
  tab:'board',
  termF:'ALL',
  sortKey:'requiredBy_asc',
  filterProduct:'ALL',
  filterAccount:'ALL',
  inputs:JSON.parse(localStorage.getItem('nsg_inputs')||'{}'),
  schedules:JSON.parse(localStorage.getItem('nsg_schedules')||'{}'),
  completedLoads:JSON.parse(localStorage.getItem('nsg_completedLoads')||'[]'),
  deliveredEntries:JSON.parse(localStorage.getItem('nsg_deliveredEntries')||'[]'),
  // uploadHistory removed (no longer used)
  calMonth:TODAY.getMonth(), calYear:TODAY.getFullYear(),
  detailItem:null, schedulerItem:null, schedulerRows:[],
  lastDataInfo:null // set after CSV load
};
function save(){
  try{
    localStorage.setItem('nsg_inputs',JSON.stringify(state.inputs));
    localStorage.setItem('nsg_schedules',JSON.stringify(state.schedules));
    localStorage.setItem('nsg_completedLoads',JSON.stringify(state.completedLoads));
    localStorage.setItem('nsg_deliveredEntries',JSON.stringify(state.deliveredEntries));
  }catch(e){}
}
function upd(id,f,v){if(!state.inputs[id])state.inputs[id]={};state.inputs[id][f]=v;save();render();}
const pCol=d=>{ if(!d) return '#64748b'; const x=(new Date(d)-TODAY)/864e5; return x<-30?'#dc2626':x<-7?'#ca8a04':'#16a34a'; };
const fD=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
const fDS=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
const ovd=d=>d?Math.floor((TODAY-new Date(d))/864e5):null;
const pC=p=>p.includes('Road Salt')?'#3b82f6':p.includes('Brine Salt')?'#8b5cf6':p.includes('Ice Slicer')?'#06b6d4':p.includes('Brine Solution')?'#10b981':'#f59e0b';
const isEntryDelivered=(id,si,dt)=>state.deliveredEntries.some(e=>e.id===id&&e.schedIdx===(si!=null?si:-1)&&e.date===(dt||''));
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ---- NEW: load CSV and replace state.data, preserving inputs/schedules
async function initDataFromCsv(){
  try{
    const text = await fetchText(CSV_URL);
    const rows = parseCsvToRows(text);
    if(!rows.length) throw new Error('CSV parsed empty');
    const newData = rows.map((r,i)=>({...r,_id:i}));

    const newIn={}, newSc={};
    newData.forEach(nr=>{
      const old = state.data.find(o=>o.orderNbr===nr.orderNbr && o.account===nr.account && o.product===nr.product);
      if(old){
        if(state.inputs[old._id])   newIn[nr._id] = state.inputs[old._id];
        if(state.schedules[old._id])newSc[nr._id] = state.schedules[old._id];
      }
    });

    state.data = newData;
    state.inputs = newIn;
    state.schedules = newSc;
    state.lastDataInfo = { fileName: 'TXDOT_latest.csv', sourcePath: CSV_URL, pickedBy: 'fixed-file' };
    save();
    render(); // re-render with latest CSV
  }catch(err){
    console.warn('CSV load failed, using embedded DATA. Error:', err);
    state.lastDataInfo = { fileName: '(embedded)', sourcePath: '', pickedBy: 'fallback' };
  }
}

function getFiltered(){
  let d=state.data.filter(r=>r.shipmentsRemaining>0);
  if(state.termF!=='ALL') d=d.filter(r=>r.terminal===state.termF);
  if(state.filterProduct!=='ALL') d=d.filter(r=>r.product===state.filterProduct);
  if(state.filterAccount!=='ALL') d=d.filter(r=>r.account===state.filterAccount);
  const [field,dir]=state.sortKey.split('_');
  d.sort((a,b)=>{
    let va=a[field], vb=b[field];
    if(typeof va==='number') return dir==='asc'?va-vb:vb-va;
    va=va||''; vb=vb||'';
    return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
  });
  return d;
}
function getStats(){
  const all=state.termF==='ALL'?state.data:state.data.filter(r=>r.terminal===state.termF);
  const tOrd=all.reduce((s,r)=>s+r.orderedQty,0), tShip=all.reduce((s,r)=>s+r.shipments,0), tRem=all.reduce((s,r)=>s+r.shipmentsRemaining,0);
  const byP={}; all.forEach(r=>{ if(!byP[r.product]) byP[r.product]={shipped:0,remaining:0,ordered:0}; byP[r.product].shipped+=r.shipments; byP[r.product].remaining+=r.shipmentsRemaining; byP[r.product].ordered+=r.orderedQty;});
  return {tOrd,tShip,tRem,byP};
}
function getCalItems(){
  const map={};
  state.data.forEach(r=>{
    const sched=state.schedules[r._id];
    if(sched&&sched.length>0){
      sched.forEach((s,si)=>{
        if(s.date&&s.loads>0){
          if(!map[s.date]) map[s.date]=[];
          map[s.date].push({...r,_sL:s.loads,_sC:s.carrier||'',_sT:s.trailerType||'',_si:si});
        }
      });
    } else {
      const est=state.inputs[r._id]?.estDelivery;
      if(est){
        if(!map[est]) map[est]=[];
        map[est].push({...r,_sL:r.shipmentsRemaining,_sC:state.inputs[r._id]?.carrier||'',_sT:state.inputs[r._id]?.trailerType||'',_si:-1});
      }
    }
  });
  return map;
}
function optionsHtml(opts,sel){return opts.map(o=>`<option value="${esc(o)}"${o===sel?' selected':''}>${esc(o||'Select...')}</option>`).join('');}
function markDelivered(r,dt){
  if(isEntryDelivered(r._id,r._si,dt)) return;
  state.deliveredEntries.push({id:r._id,schedIdx:r._si!=null?r._si:-1,date:dt||''});
  const ui=state.inputs[r._id]||{};
  state.completedLoads.unshift({
    ...r,
    completedDate:new Date().toISOString().slice(0,10),
    completedTime:new Date().toLocaleTimeString(),
    carrier:r._sC||ui.carrier||'',
    trailerType:r._sT||ui.trailerType||'',
    estDelivery:dt||ui.estDelivery||'',
    deliveredLoads:r._sL||r.shipmentsRemaining,
    _entrySchedIdx:r._si!=null?r._si:-1,
    _entryDate:dt||''
  });
  save(); render();
}
function undoCompleted(idx){
  const item=state.completedLoads[idx]; if(!item) return;
  state.completedLoads.splice(idx,1);
  state.deliveredEntries=state.deliveredEntries.filter(e=>!(e.id===item._id && e.schedIdx===(item._entrySchedIdx!=null?item._entrySchedIdx:-1) && e.date===(item._entryDate||'')));
  save(); render();
}
function exportCSV(){
  let csv='Status,Account,Location,Order Nbr,Product,Ordered,Shipped,Remaining,Required By,Terminal,Est Delivery,Loads,Carrier,Trailer,Completed\n';
  state.data.forEach(r=>{const ui=state.inputs[r._id]||{}; csv+=`Active,${esc(r.account)},"${esc(r.location)}",${esc(r.orderNbr)},"${esc(r.product)}",${r.orderedQty},${r.shipments},${r.shipmentsRemaining},${r.requiredBy},${esc(r.terminal)},${ui.estDelivery||''},${ui.estLoads||''},${ui.carrier||''},${ui.trailerType||''},\n`;});
  state.completedLoads.forEach(r=>{ csv+=`Completed,${esc(r.account)},"${esc(r.location)}",${esc(r.orderNbr)},"${esc(r.product)}",${r.orderedQty},${r.shipments},${r.shipmentsRemaining},${r.requiredBy},${esc(r.terminal)},${r.estDelivery||''},,${r.carrier||''},${r.trailerType||''},${r.completedDate||''}\n`;});
  const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='NSG_TxDOT_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

// ===== RENDER =====
function render(){
  const s=state, d=getFiltered(), st=getStats(), pct=st.tOrd>0?Math.round(st.tShip/st.tOrd*100):0;
  const terms=[...new Set(s.data.map(r=>r.terminal))].sort();
  const prods=[...new Set(s.data.map(r=>r.product))].sort();
  const accts=[...new Set(s.data.map(r=>r.account))].sort();

  let h=`<div class="hdr"><div class="logo"><div class="logo-icon">N</div><div><div style="font-size:20px;font-weight:700;color:#f8fafc">NSG - TxDOT</div><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.08em">Load Scheduling &amp; Dispatch Board</div></div></div>`;

  h+=`<div class="tabs">`;
  ['board','calendar','completed','products','dashboard'].forEach(t=>{
    const labels={board:'Priority Board',calendar:'Calendar',completed:'Completed',products:'By Product',dashboard:'Dashboard'};
    h+=`<button class="tab${s.tab===t?' active':''}" onclick="state.tab='${t}';render()">${labels[t]}</button>`;
  });
  h+=`</div><button class="btn btn-green" onclick="exportCSV()" style="display:flex;align-items:center;gap:5px">📥 Export</button></div>`;

  // NEW: show which data file is loaded
  if (s.lastDataInfo){
    h+=`<div style="padding:6px 20px;background:#0f1629;border-bottom:1px solid #1e293b;font-size:11px;color:#94a3b8">
           Data source: <b style="color:#f8fafc">${esc(s.lastDataInfo.fileName)}</b>
           <span style="margin-left:8px;color:#64748b">(${esc(s.lastDataInfo.pickedBy)})</span>
        </div>`;
  }

  // Filter bar
  h+=`<div class="filter-bar"><span style="font-size:11px;color:#64748b;font-weight:600">TERMINAL:</span><select onchange="state.termF=this.value;render()"><option value="ALL">All</option>${terms.map(t=>`<option value="${esc(t)}"${s.termF===t?' selected':''}>${esc(t)}</option>`).join('')}</select><div style="flex:1"></div><span style="font-size:12px;color:#94a3b8"><b style="color:#f8fafc">${d.length}</b> items | <b style="color:#f8fafc">${st.tRem}</b> remaining</span></div>`;

  // Stats
  h+=`<div class="stats">`;
  [[st.tOrd,'Total Ordered','#c2410c'],[st.tShip,'Total Shipped','#22c55e'],[st.tRem,'Remaining','#ca8a04'],[s.completedLoads.length,'Delivered','#22c55e'],[pct+'%','Completion','#3b82f6']].forEach(([v,l,c],i)=>{
    h+=`<div class="stat" style="border-left:3px solid ${c}"><div class="stat-val" style="${i===2?'color:#ca8a04':''}">${v}</div><div class="stat-label">${l}</div>${i===4?`<div style="margin-top:4px;height:4px;border-radius:2px;background:#1e293b"><div style="height:4px;border-radius:2px;background:#3b82f6;width:${pct}%"></div></div>`:''}</div>`;
  });
  h+=`</div><div class="main">`;

  // ===== PRIORITY BOARD =====
  if(s.tab==='board'){
    h+=`<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap">`;
    h+=`<span style="font-size:11px;color:#64748b;font-weight:600">SORT:</span><select onchange="state.sortKey=this.value;render()" style="width:190px">${SORTS.map(o=>`<option value="${o.k}"${s.sortKey===o.k?' selected':''}>${o.l}</option>`).join('')}</select>`;
    h+=`<span style="font-size:11px;color:#64748b;font-weight:600;margin-left:8px">PRODUCT:</span><select onchange="state.filterProduct=this.value;render()" style="width:170px"><option value="ALL">All</option>${prods.map(p=>`<option value="${esc(p)}"${s.filterProduct===p?' selected':''}>${esc(p)}</option>`).join('')}</select>`;
    h+=`<span style="font-size:11px;color:#64748b;font-weight:600;margin-left:8px">ACCOUNT:</span><select onchange="state.filterAccount=this.value;render()" style="width:170px"><option value="ALL">All</option>${accts.map(a=>`<option value="${esc(a)}"${s.filterAccount===a?' selected':''}>${esc(a)}</option>`).join('')}</select>`;
    h+=`<button class="btn" onclick="state.sortKey='requiredBy_asc';state.filterProduct='ALL';state.filterAccount='ALL';render()">Reset</button></div>`;
    // Header
    h+=`<div class="row row-hdr cols">
      <span style="color:#c2410c">Priority</span><span>Customer</span><span>Delivery Location</span><span>Work Order</span><span>Product Type</span><span style="text-align:center">Ord</span><span style="text-align:center;color:#22c55e">Ship</span><span style="text-align:center;color:#ca8a04">Rem</span><span>Req By</span><span>Est. Delivery</span><span style="text-align:center">Loads</span><span>Carrier</span><span>Trailer Type</span><span style="text-align:center;color:#3b82f6">Schedule</span></div>`;
    d.forEach((r,idx)=>{
      const ui=s.inputs[r._id]||{}, od=ovd(r.requiredBy), sc=s.schedules[r._id], hasSc=sc&&sc.length>0;
      const scCnt=hasSc?sc.length:0, scL=hasSc?sc.reduce((a,x)=>a+(x.loads||0),0):0;
      h+=`<div class="row cols" style="${hasSc?'background:#111d2e;border-color:#1e3a5f':''}">
        <span class="badge" style="background:${pCol(r.requiredBy)}22;color:${pCol(r.requiredBy)}">${idx+1}</span>
        <span style="color:#f8fafc;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.account)}">${esc(r.account.replace('TxDOT ',''))}</span>
        <span style="color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px" title="${esc(r.location)}">${esc(r.location)}</span>
        <span style="color:#60a5fa;font-weight:600;font-size:11px">${esc(r.orderNbr)}</span>
        <span class="tag" style="background:${pC(r.product)}18;color:${pC(r.product)}">${esc(r.product.length>26?r.product.slice(0,26)+'…':r.product)}</span>
        <span style="font-weight:600;color:#f8fafc;text-align:center">${r.orderedQty}</span>
        <span style="color:#22c55e;text-align:center">${r.shipments}</span>
        <span style="color:#ca8a04;font-weight:700;text-align:center">${r.shipmentsRemaining}</span>
        <div><span style="font-size:10px;color:${pCol(r.requiredBy)};font-weight:600">${fDS(r.requiredBy)}</span>${od>0?`<div style="font-size:9px;color:#dc2626">${od}d</div>`:''}</div>
        <input type="date" value="${ui.estDelivery||''}" onchange="upd(${r._id},'estDelivery',this.value)" style="width:92px">
        <input type="number" min="0" placeholder="0" value="${ui.estLoads||''}" onchange="upd(${r._id},'estLoads',this.value)" style="width:44px">
        <input type="text" placeholder="Carrier" value="${esc(ui.carrier||'')}" onchange="upd(${r._id},'carrier',this.value)" style="width:95px">
        <select onchange="upd(${r._id},'trailerType',this.value)" style="width:88px">${optionsHtml(TRAILERS,ui.trailerType||'')}</select>

  // ===== CALENDAR =====
  else if(s.tab==='calendar'){

    </div>`;
    h+=`<table class="cal"><thead><tr>${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<th style="padding:6px 4px;background:#0f1629;color:#64748b;font-size:11px;font-weight:600;text-align:center;border-bottom:1px solid #1e293b">${d}</th>`).join('')}</tr></thead><tbody><tr>`;
    let cells=0;
    for(let i=0;i<sd;i++){h+=`<td class="cal-cell" style="background:#0a0e17"></td>`;cells++;}
    const today=toYMD(TODAY);
    for(let day=1;day<=dim;day++){
      if(cells>0&&cells%7===0) h+=`</tr><tr>`;
      const ds=`${s.calYear}-${String(s.calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const isT=ds===today;
      const isWe=new Date(ds+'T00:00:00').getDay()===0||new Date(ds+'T00:00:00').getDay()===6;
      const items=ci[ds]||[];
      const tl=items.reduce((a,r)=>a+(r._sL||r.shipmentsRemaining),0);
      h+=`<td class="cal-cell${isT?' cal-today':''}" style="background:${isWe?'#0d111a':'#111827'}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="event.preventDefault();this.classList.remove('drag-over');calDrop('${ds}')">`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid #1e293b30"><span style="font-size:13px;font-weight:${isT?800:600};color:${isT?'#c2410c':'#f8fafc'}">${day}</span>${items.length?`<span style="font-size:9px;font-weight:700;color:#ca8a04;background:#ca8a0418;padding:1px 5px;border-radius:3px">${tl} loads</span>`:''}</div>`;
      items.forEach((r,idx)=>{
        const del=isEntryDelivered(r._id,r._si,ds);
        const c=del?'#6b7280':pC(r.product);
        h+=`<div class="cal-tag${del?' delivered':''}" draggable="${!del}" ondragstart="calDragStart(${r._id},${r._si!=null?r._si:-1})" onclick="showDetail(${r._id},${r._si!=null?r._si:-1},'${ds}')" style="background:${del?'#37415118':c+'15'};color:${c};border-left:3px solid ${del?'#4b556380':c};opacity:${del?.65:1}">
          <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;font-size:11px">${del?'✓ ':''}${esc(r.orderNbr)}</span><span style="font-weight:800;font-size:13px;color:${del?'#6b7280':'#ca8a04'};background:${del?'#37415130':'#ca8a0420'};padding:0 4px;border-radius:3px">${r._sL||r.shipmentsRemaining}</span></div>
          <div style="font-size:10px;color:${del?'#4b5563':'#94a3b8'};margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.account.replace('TxDOT ',''))}</div>
          ${del?`<div style="font-size:9px;color:#6b7280;margin-top:1px;font-weight:600">✓ DELIVERED</div>`:`<div style="font-size:9px;color:${c}99;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.product.length>30?r.product.slice(0,30)+'…':r.product)}</div>`}
          ${!del&&r._sC?`<div style="font-size:9px;color:#22c55e;margin-top:1px">🚛 ${esc(r._sC)}</div>`:''}
        </div>`;
      });
      h+=`</td>`; cells++;
    }
    while(cells%7!==0){h+=`<td class="cal-cell" style="background:#0a0e17"></td>`;cells++;}
    h+=`</tr></tbody></table>`;
  }

  // ===== COMPLETED =====
  else if(s.tab==='completed'){
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:14px;font-weight:700;color:#f8fafc">Completed Loads (${s.completedLoads.length})</div></div>`;
    if(!s.completedLoads.length){
      h+=`<div style="text-align:center;padding:50px;background:#111827;border-radius:10px;border:1px solid #1e293b"><div style="font-size:40px;margin-bottom:10px">✓</div><div style="font-size:16px;font-weight:700;color:#f8fafc;margin-bottom:8px">No Completed Loads Yet</div><div style="font-size:13px;color:#94a3b8">Click a load on the Calendar, then "✓ Mark as Delivered"</div></div>`;
    } else {
      h+=`<div class="row row-hdr" style="grid-template-columns:90px 130px 160px 110px 1fr 50px 80px 90px 100px 60px">Completed,Customer,Location,Work Order,Product,Qty,Required By,Carrier,Trailer,Action</div>`.replace(/,/g,'</span><span>').replace('Completed','<span>Completed');
      s.completedLoads.forEach((r,idx)=>{
        h+=`<div class="row" style="grid-template-columns:90px 130px 160px 110px 1fr 50px 80px 90px 100px 60px;background:#22c55e08;border-color:#22c55e20">
          <div><div style="font-size:11px;font-weight:600;color:#22c55e">${r.completedDate||''}</div><div style="font-size:9px;color:#94a3b8">${r.completedTime||''}</div></div>
          <span style="color:#f8fafc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.account.replace('TxDOT ',''))}</span>
          <span style="color:#94a3b8;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.location)}</span>
          <span style="color:#60a5fa;font-weight:600">${esc(r.orderNbr)}</span>
          <span class="tag" style="background:${pC(r.product)}18;color:${pC(r.product)}">${esc(r.product.length>25?r.product.slice(0,25)+'…':r.product)}</span>
          <span style="font-weight:700;color:#f8fafc;text-align:center">${r.deliveredLoads||r.shipmentsRemaining}</span>
          <span style="font-size:10px;color:${pCol(r.requiredBy)}">${fDS(r.requiredBy)}</span>
          <span style="color:#94a3b8;font-size:10px">${esc(r.carrier||'—')}</span>
          <span style="color:#94a3b8;font-size:9px">${esc(r.trailerType||'—')}</span>
          <button class="btn" style="font-size:9px;padding:2px 6px;color:#ca8a04;border-color:#ca8a0460" onclick="undoCompleted(${idx})">↩ Undo</button>
        </div>`;
      });
    }
  }

  // ===== BY PRODUCT =====
  else if(s.tab==='products'){
    h+=`<table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:12px"><thead><tr style="background:#0f1629">`;
    ['Product Type','Total Ordered','Total Shipped','Remaining','% Complete'].forEach((c,i)=>{h+=`<th style="text-align:${i?'right':'left'};padding:8px 12px;border-bottom:1px solid #1e293b;color:#64748b;font-size:11px;text-transform:uppercase">${c}</th>`;});
    h+=`</tr></thead><tbody>`;
    Object.entries(st.byP).sort((a,b)=>b[1].remaining-a[1].remaining).forEach(([p,v])=>{
      const pc=v.ordered>0?Math.round(v.shipped/v.ordered*100):0;
      h+=`<tr><td style="padding:8px 12px;border-bottom:1px solid #1e293b08"><span class="tag" style="background:${pC(p)}18;color:${pC(p)}">${esc(p)}</span></td><td style="text-align:right;padding:8px 12px;font-weight:600;border-bottom:1px solid #1e293b08">${v.ordered}</td><td style="text-align:right;padding:8px 12px;color:#22c55e;border-bottom:1px solid #1e293b08">${v.shipped}</td><td style="text-align:right;padding:8px 12px;color:#ca8a04;font-weight:600;border-bottom:1px solid #1e293b08">${v.remaining}</td><td style="text-align:right;padding:8px 12px;border-bottom:1px solid #1e293b08"><span style="font-weight:600">${pc}%</span></td></tr>`;
    });
    h+=`<tr style="background:#0f1629;font-weight:700"><td style="padding:8px 12px">TOTALS</td><td style="text-align:right;padding:8px 12px">${st.tOrd}</td><td style="text-align:right;padding:8px 12px;color:#22c55e">${st.tShip}</td><td style="text-align:right;padding:8px 12px;color:#ca8a04">${st.tRem}</td><td style="text-align:right;padding:8px 12px">${pct}%</td></tr></tbody></table>`;
  }

  // ===== DASHBOARD =====
  else if(s.tab==='dashboard'){
    const grp={}; state.data.filter(r=>r.shipmentsRemaining>0).forEach(r=>{ if(!grp[r.account]) grp[r.account]=0; grp[r.account]+=r.shipmentsRemaining; });
    const maxR=Math.max(...Object.values(grp),1);
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px">`;
    h+=`<div style="background:#111827;border:1px solid #1e293b;border-radius:10px;padding:18px"><div style="font-size:14px;font-weight:700;color:#f8fafc;margin-bottom:12px">Remaining by Customer</div>`;
    Object.entries(grp).sort((a,b)=>b[1]-a[1]).forEach(([a,rem])=>{
      h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:130px;font-size:11px;color:#94a3b8;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.replace('TxDOT ',''))}</div><div style="flex:1;height:14px;background:#1e293b;border-radius:3px;overflow:hidden"><div style="height:14px;border-radius:3px;background:linear-gradient(90deg,#c2410c,#ea580c);width:${rem/maxR*100}%"></div></div><div style="width:30px;font-size:12px;font-weight:600;color:#f8fafc;text-align:right">${rem}</div></div>`;
    });
    h+=`</div>`;
    h+=`<div style="background:#111827;border:1px solid #1e293b;border-radius:10px;padding:18px"><div style="font-size:14px;font-weight:700;color:#f8fafc;margin-bottom:12px">Terminal Breakdown</div>`;
    const terms=[...new Set(state.data.map(r=>r.terminal))].sort();
    terms.forEach(t=>{
      const td=state.data.filter(r=>r.terminal===t);
      h+=`<div style="background:#0a0e17;border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid #1e293b"><div style="font-size:14px;font-weight:700;color:#f8fafc;margin-bottom:8px">${esc(t)}</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">${[['Ordered',td.reduce((s,r)=>s+r.orderedQty,0),'#f8fafc'],['Shipped',td.reduce((s,r)=>s+r.shipments,0),'#22c55e'],['Remaining',td.reduce((s,r)=>s+r.shipmentsRemaining,0),'#ca8a04']].map(([l,v,c])=>`<div><div style="font-size:20px;font-weight:700;color:${c}">${v}</div><div style="font-size:10px;color:#64748b">${l}</div></div>`).join('')}</div></div>`;
    });
    h+=`</div></div>`;
  }

  h+=`</div>`; // close main
  document.getElementById('app').innerHTML=h;
}

// Calendar drag/drop
let dragData=null;
window.calDragStart=function(id,si){dragData={id,si};};
window.calDrop=function(ds){
  if(!dragData) return;
  const {id,si}=dragData;
  if(si>=0){ const arr=[...(state.schedules[id]||[])]; if(arr[si]) arr[si]={...arr[si],date:ds}; state.schedules[id]=arr; }
  else upd(id,'estDelivery',ds);
  dragData=null; save(); render();
};
// Detail popup
window.showDetail=function(id,si,ds){
  const r=state.data.find(x=>x._id===id); if(!r) return;
  const ui=state.inputs[id]||{}; const del=isEntryDelivered(id,si,ds); const od=ovd(r.requiredBy);
  const sched=state.schedules[id]; const schedEntry=sched&&si>=0?sched[si]:null;
  const loadQty=schedEntry?schedEntry.loads:r.shipmentsRemaining;
  const carrier=schedEntry?.carrier||ui.carrier||''; const trailer=schedEntry?.trailerType||ui.trailerType||'';
  let m=`<div class="overlay" onclick="closeDetail()"><div class="modal" onclick="event.stopPropagation()">`;
  m+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><div style="font-size:18px;font-weight:700;color:#f8fafc">${esc(r.orderNbr)}</div><span class="tag" style="background:${pC(r.product)}18;color:${pC(r.product)};font-size:12px;margin-top:4px">${esc(r.product)}</span></div><button onclick="closeDetail()" style="background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer">✕</button></div>`;
  if(od>0) m+=`<div style="background:#dc262615;border:1px solid #dc262640;border-radius:6px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:8px"><span style="font-size:20px">⚠️</span><span style="color:#dc2626;font-weight:600;font-size:13px">${od} days overdue</span></div>`;
  m+=`<div style="background:#0a0e17;border-radius:8px;padding:4px 14px;margin-bottom:12px">`;
  [['Customer',r.account],['Delivery Location',r.location],['Terminal',r.terminal]].forEach(([l,v])=>{ m+=`<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value">${esc(v)}</span></div>`;});
  m+=`</div><div style="background:#0a0e17;border-radius:8px;padding:4px 14px;margin-bottom:12px">`;
  [['Required By',fD(r.requiredBy),pCol(r.requiredBy)],['Loads This Entry',loadQty,'#ca8a04'],['Total Ordered',r.orderedQty],['Shipments Completed',r.shipments,'#22c55e'],['Total Remaining',r.shipmentsRemaining,'#ca8a04']].forEach(([l,v,c])=>{ m+=`<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value" style="color:${c||'#e2e8f0'}">${v}</span></div>`;});
  m+=`</div><div style="background:#0a0e17;border-radius:8px;padding:4px 14px;margin-bottom:12px">`;
  [['Scheduled Date',fD(ds),'#3b82f6'],['Carrier',carrier||'Not assigned'],['Trailer Type',trailer||'Not set']].forEach(([l,v,c])=>{ m+=`<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value" style="color:${c||'#e2e8f0'}">${esc(v)}</span></div>`;});
  m+=`</div>`;
  // Delivered button
  m+=`<div style="margin-top:16px;padding-top:14px;border-top:1px solid #1e293b">`;
  if(del){
    m+=`<div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:50%;background:#22c55e20;display:flex;align-items:center;justify-content:center;font-size:16px">✓</div><div><div style="font-size:13px;font-weight:700;color:#22c55e">This Load Delivered</div><div style="font-size:11px;color:#94a3b8">${loadQty} loads on ${fD(ds)}</div></div></div><button class="btn" style="color:#ca8a04;border-color:#ca8a04" onclick="undoDeliveryFromDetail(${id},${si},'${ds}')">↩ Undo</button></div>`;
  } else {
    m+=`<button onclick="deliverFromDetail(${id},${si},'${ds}')" style="width:100%;padding:10px 16px;border-radius:6px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-weight:700;font-size:14px;cursor:pointer">✓ Mark as Delivered</button>`;
  }
  m+=`</div></div></div>`;
  document.getElementById('app').insertAdjacentHTML('beforeend',m);
};
window.closeDetail=function(){const o=document.querySelector('.overlay');if(o)o.remove();};
window.deliverFromDetail=function(id,si,ds){
  const r=state.data.find(x=>x._id===id); if(!r) return;
  const sched=state.schedules[id]; const se=sched&&si>=0?sched[si]:null;
  markDelivered({...r,_si:si,_sL:se?se.loads:r.shipmentsRemaining,_sC:se?.carrier||'',_sT:se?.trailerType||''},ds);
  closeDetail();
};
window.undoDeliveryFromDetail=function(id,si,ds){
  const idx=state.completedLoads.findIndex(c=>c._id===id && c._entrySchedIdx===(si!=null?si:-1) && c._entryDate===(ds||''));
  if(idx>=0) undoCompleted(idx);
  else { state.deliveredEntries=state.deliveredEntries.filter(e=>!(e.id===id&&e.schedIdx===(si!=null?si:-1)&&e.date===(ds||''))); save(); }
  closeDetail(); render();
};
// Scheduler
window.openScheduler=function(id){
  const r=state.data.find(x=>x._id===id); if(!r) return;
  state.schedulerItem=r;
  const ex=state.schedules[id]||[];
  state.schedulerRows=ex.length?ex.map(s=>({...s})):[{date:'',loads:'',carrier:'',trailerType:''}];
  renderScheduler();
};
function renderScheduler(){
  const r=state.schedulerItem; if(!r) return;
  const rows=state.schedulerRows;
  const tot=rows.reduce((a,x)=>a+(parseInt(x.loads)||0),0);
  const rem=r.shipmentsRemaining-tot; const over=tot>r.shipmentsRemaining;
  let m=`<div class="overlay" onclick="closeScheduler()"><div class="modal" onclick="event.stopPropagation()">`;
  m+=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><div><div style="font-size:18px;font-weight:700;color:#f8fafc">Schedule Loads</div><div style="font-size:13px;color:#94a3b8;margin-top:2px">${esc(r.orderNbr)} — ${esc(r.account)}</div></div><button onclick="closeScheduler()" style="background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer">✕</button></div>`;
  m+=`<div style="display:flex;gap:16px;margin-bottom:14px;padding:10px 14px;background:#0a0e17;border-radius:8px"><div><div style="font-size:10px;color:#64748b">TOTAL</div><div style="font-size:20px;font-weight:700;color:#f8fafc">${r.shipmentsRemaining}</div></div><div><div style="font-size:10px;color:#64748b">ASSIGNED</div><div style="font-size:20px;font-weight:700;color:${over?'#dc2626':'#22c55e'}">${tot}</div></div><div><div style="font-size:10px;color:#64748b">UNASSIGNED</div><div style="font-size:20px;font-weight:700;color:${rem>0?'#ca8a04':rem===0?'#22c55e':'#dc2626'}">${rem}</div></div></div>`;
  if(over) m+=`<div style="background:#dc262615;border:1px solid #dc262640;border-radius:6px;padding:8px 12px;margin-bottom:12px;color:#dc2626;font-weight:600;font-size:12px">⚠️ Over-allocated by ${tot-r.shipmentsRemaining}</div>`;
  m+=`<div style="display:grid;grid-template-columns:130px 70px 130px 120px 36px;gap:8px;font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:6px"><span>Date</span><span>Loads</span><span>Carrier</span><span>Trailer</span><span></span></div>`;
  rows.forEach((row,i)=>{
    m+=`<div style="display:grid;grid-template-columns:130px 70px 130px 120px 36px;gap:8px;margin-bottom:6px;align-items:center"><input type="date" value="${row.date||''}" onchange="schedRowUpd(${i},'date',this.value)"><input type="number" min="1" value="${row.loads||''}" placeholder="0" style="font-weight:700;color:#ca8a04" onchange="schedRowUpd(${i},'loads',this.value)"><input type="text" value="${esc(row.carrier||'')}" placeholder="Carrier" onchange="schedRowUpd(${i},'carrier',this.value)"><select onchange="schedRowUpd(${i},'trailerType',this.value)">${optionsHtml(TRAILERS,row.trailerType||'')}</select><button class="btn" style="color:#dc2626;border-color:#dc262640;padding:2px 8px;font-size:14px" onclick="schedRowDel(${i})">✕</button></div>`;
  });
  m+=`<div style="display:flex;justify-content:space-between;margin-top:12px"><button class="btn" style="color:#3b82f6;border-color:#3b82f6" onclick="schedRowAdd()">+ Add Date</button><div style="display:flex;gap:8px"><button class="btn" style="color:#dc2626;border-color:#dc2626" onclick="schedClear()">Clear</button><button class="btn btn-accent" ${over?'disabled style="opacity:.5;cursor:not-allowed"':''} onclick="schedSave()">Save Schedule</button></div></div>`;
  m+=`</div></div>`;
  const old=document.querySelector('.overlay'); if(old) old.remove();
  document.getElementById('app').insertAdjacentHTML('beforeend',m);
}
window.closeScheduler=function(){state.schedulerItem=null;const o=document.querySelector('.overlay');if(o)o.remove();};
window.schedRowUpd=function(i,f,v){state.schedulerRows[i][f]=v;renderScheduler();};
window.schedRowDel=function(i){state.schedulerRows.splice(i,1);renderScheduler();};
window.schedRowAdd=function(){state.schedulerRows.push({date:'',loads:'',carrier:'',trailerType:''});renderScheduler();};
window.schedClear=function(){const r=state.schedulerItem;if(!r)return;delete state.schedules[r._id];save();closeScheduler();render();};
window.schedSave=function(){
  const r=state.schedulerItem;if(!r)return;
  const valid=state.schedulerRows.filter(s=>s.date&&parseInt(s.loads)>0).map(s=>({date:s.date,loads:parseInt(s.loads),carrier:s.carrier||'',trailerType:s.trailerType||''}));
  state.schedules[r._id]=valid;
  if(valid.length) upd(r._id,'estDelivery',valid[0].date);
  save(); closeScheduler(); render();
};

// Initial render (embedded fallback), then load shared CSV and refresh
render();
initDataFromCsv();
</script>
